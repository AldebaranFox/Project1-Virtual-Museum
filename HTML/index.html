<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Virtual Art Museum</title>
      <link rel="StyleSheet" href="../CSS/index-stylesheet.css">
      <script src="../Scripts/indexBackEnd.js" defer></script>
   </head>
   <body>
      <h1 id="welcome">Welcome to the Art Museum</h1>
      <br>

      <div id="about">
         <p id="aboutText">
            This is a website that allows you to navigate a virtual art museum. With access to 19 individual departments where each will contain up to 15 distinct art pieces.
            <br>All sources generated from https://metmuseum.github.io/
         </p>
      </div>

   <div class="toggleContainer">
      <label class="toggle">
         <input type="checkbox" id="imgToggle"/>
         <span class="slider"></span>
      </label>
      <span>Entries without images</span>
   </div>

      <div id="departmentDiv">
         <p id="departmentTitle">Departments</p>
         <br>
         <ul id="departmentList"></ul>
      </div>

   </body>
</html>
